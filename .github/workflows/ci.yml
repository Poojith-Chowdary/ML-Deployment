name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Generate dataset
        run: python generate_data.py

      - name: Train model
        run: python src/train.py

      - name: Lint with ruff
        run: ruff check src/ api/ tests/

      - name: Run tests
        run: |
          export PYTHONPATH=.
          pytest tests/ -v --cov=src --cov=api --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate dataset + train model (needed for image)
        run: |
          pip install -r requirements.txt
          python generate_data.py
          python src/train.py

      - name: Build Docker image
        run: docker build -t ml-api:ci .

      - name: Smoke test container
        run: |
          docker run -d -p 8000:8000 --name ml-api-test ml-api:ci
          sleep 5
          curl -f http://localhost:8000/health
          docker stop ml-api-test
