name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}

    steps:
      - name: Trigger Render deploy hook
        run: curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"